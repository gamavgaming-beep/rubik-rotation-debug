<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Cube 3D Debugger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main Canvas Container for Three.js Rendering -->
  <div id="canvas-container"></div>

  <!-- UI Overlay for Instructions -->
  <div id="ui-overlay">
    <h2>Rubik's Cube 3D Debugger</h2>
    <p>Mouse Drag: Rotate View | Scroll: Zoom In/Out</p>
  </div>

  <!-- Three.js Core Library (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Three.js OrbitControls Helper (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Application Modules -->
  <script src="camera.js"></script>
  <script src="cube.js"></script>
  <script src="app.js"></script>

</body>
</html>
