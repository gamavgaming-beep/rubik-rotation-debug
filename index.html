<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubik's Cube 3D Debugger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="canvas-container"></div>

  <!-- Real-time Live Camera HUD Overlay -->
  <div id="camera-hud">
    <h3>🎥 Camera & Cube Values</h3>

    <div class="hud-section highlight-view">
      <div>Current View: <span id="current-view">FRONT</span></div>
    </div>
    
    <div class="hud-section">
      <div class="hud-title">✅ Camera Position</div>
      <div>X: <span id="pos-x">0.00</span> | Y: <span id="pos-y">0.00</span> | Z: <span id="pos-z">0.00</span></div>
    </div>

    <div class="hud-section">
      <div class="hud-title">✅ Camera Rotation</div>
      <div>X: <span id="rot-x">0.00</span> | Y: <span id="rot-y">0.00</span> | Z: <span id="rot-z">0.00</span></div>
    </div>

    <div class="hud-section metrics">
      <div class="hud-title">📐 Orbit Angle Metrics</div>
      <div>Distance: <span id="orbit-dist">0.00</span></div>
      <div>Azimuth Angle: <span id="orbit-azimuth">0.00°</span></div>
      <div>Polar Angle: <span id="orbit-polar">0.00°</span></div>
    </div>

    <div class="hud-section highlight">
      <div>Center Face: <span id="center-face">FRONT</span></div>
      <div>Back Face: <span id="back-face">BACK</span></div>
    </div>
  </div>

  <!-- Navigation Buttons Panel -->
  <div id="controls-panel">
    <h3>🎯 Cube Controls</h3>
    <div class="button-grid">
      <button onclick="rotateCubeTo('RESET')">Front Center</button>
      <button onclick="rotateCubeTo('RIGHT')">Front ➔ Right</button>
      <button onclick="rotateCubeTo('LEFT')">Front ➔ Left</button>
      <button onclick="rotateCubeTo('UP')">Front ➔ Up</button>
      <button onclick="rotateCubeTo('DOWN')">Front ➔ Down</button>
      <button onclick="rotateCubeTo('BACK')">Front ➔ Back</button>
    </div>
  </div>

  <!-- Stable CDN scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script src="camera.js"></script>
  <script src="cube.js"></script>
  <script src="app.js"></script>

</body>
</html>
